name: Weekly award discovery scan

on:
  schedule:
    - cron: "0 21 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: podcast-awards-data-update
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/discover-awards.mjs
      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/award-discovery-candidates.json
          if git diff --cached --quiet; then
            echo "No substantive data change; nothing to commit."
            exit 0
          fi
          git commit -m "chore: weekly award discovery scan"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
