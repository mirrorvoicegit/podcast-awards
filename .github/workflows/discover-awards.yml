name: Weekly award discovery scan

on:
  schedule:
    - cron: "0 21 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/discover-awards.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/award-discovery-candidates.json
          git diff --cached --quiet || git commit -m "chore: weekly award discovery scan"
          git push
