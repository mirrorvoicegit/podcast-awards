name: Monthly Mirror Voice program crawl

on:
  schedule:
    - cron: "0 20 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/crawl-mirror-programs.mjs
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/program-crawl-candidates.json
          git diff --cached --quiet || git commit -m "chore: monthly Mirror Voice program crawl"
          git push
